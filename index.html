<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Night Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1a1a1f;
    --border: #2a2a32;
    --border-glow: #3a3a50;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --text-muted: #55556a;
    --accent: #b8a9ff;
    --accent-dim: #7a6ecc;
    --accent-glow: rgba(184,169,255,0.12);
    --green: #7dd9b0;
    --amber: #f0c060;
    --red: #e07070;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Subtle background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(100,80,200,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(60,40,120,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; width: 100%; }

  /* Header */
  header { margin-bottom: 48px; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }
  h1 em { font-style: italic; color: var(--accent); }
  .tagline { margin-top: 8px; color: var(--text-muted); font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; font-family: 'DM Mono', monospace; }

  /* Status bar */
  .status-bar {
    display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap;
  }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 99px; padding: 4px 12px 4px 8px;
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim);
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
  .dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.err { background: var(--red); }
  .dot.checking { background: var(--amber); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Tabs */
  .tabs { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 3px; margin-bottom: 28px; }
  .tab {
    flex: 1; padding: 9px 16px; border-radius: 9px; border: none;
    background: transparent; color: var(--text-muted); cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400;
    transition: all 0.2s; letter-spacing: 0.02em;
  }
  .tab:hover { color: var(--text-dim); }
  .tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border-glow); }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  /* Drop Zone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .dropzone::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent-glow);
    opacity: 0; transition: opacity 0.25s;
  }
  .dropzone:hover, .dropzone.over {
    border-color: var(--accent-dim);
    transform: translateY(-2px);
  }
  .dropzone:hover::before, .dropzone.over::before { opacity: 1; }
  .dropzone.over { border-color: var(--accent); }

  .drop-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
  .drop-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--text); margin-bottom: 6px; }
  .drop-sub { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .drop-formats { margin-top: 14px; display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .fmt-tag {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 8px; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text-muted);
  }
  #file-input { display: none; }

  /* Queue */
  .queue { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
  .queue-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; display: grid; grid-template-columns: 1fr auto;
    align-items: start; gap: 12px; animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
  .qi-name { font-size: 13px; color: var(--text); font-family: 'DM Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qi-date { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .qi-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
  .bar-loader { display: inline-flex; align-items: flex-end; gap: 2.5px; height: 14px; }
  .bar-loader span {
    display: block; width: 3px; border-radius: 2px; background: var(--accent);
    animation: barFade 1.1s ease-in-out infinite;
  }
  .bar-loader span:nth-child(1) { height: 6px;  animation-delay: 0s; }
  .bar-loader span:nth-child(2) { height: 10px; animation-delay: 0.18s; }
  .bar-loader span:nth-child(3) { height: 6px;  animation-delay: 0.36s; }
  @keyframes barFade { 0%,100%{opacity:0.2} 50%{opacity:1} }

  /* Transcript */
  .transcript-box {
    margin-top: 10px; padding: 12px 14px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; line-height: 1.7; color: var(--text-dim);
    grid-column: 1 / -1;
    white-space: pre-wrap; word-break: break-word;
  }
  .transcript-box.error { color: var(--red); border-color: rgba(224,112,112,0.3); }

  .qi-actions { display: flex; gap: 6px; margin-top: 8px; grid-column: 1 / -1; }
  .btn-small {
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-dim); font-size: 11px;
    cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.15s;
  }
  .btn-small:hover { border-color: var(--accent-dim); color: var(--accent); }
  .btn-small.danger:hover { border-color: var(--red); color: var(--red); }

  /* Entries list (History + Week tab) */
  .entries-list { display: flex; flex-direction: column; gap: 12px; }
  .entry-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; transition: border-color 0.2s;
  }
  .entry-card:hover { border-color: var(--border-glow); }
  .entry-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .entry-date { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--text); }
  .entry-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .entry-chevron { color: var(--text-muted); font-size: 12px; transition: transform 0.2s; }
  .entry-card.open .entry-chevron { transform: rotate(180deg); }
  .entry-body { display: none; padding: 0 16px 16px; }
  .entry-card.open .entry-body { display: block; }
  .entry-text { font-size: 13px; line-height: 1.75; color: var(--text-dim); white-space: pre-wrap; word-break: break-word; }
  .entry-summary-block { margin-top: 14px; padding: 12px 14px; background: var(--bg); border-left: 2px solid var(--accent-dim); border-radius: 0 8px 8px 0; }
  .entry-summary-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-dim); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .entry-summary-text { font-size: 13px; line-height: 1.7; color: var(--text-dim); white-space: pre-wrap; }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
  .empty-icon { font-size: 2rem; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; line-height: 1.7; }

  /* Week summary */
  .week-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: gap; gap: 12px; }
  .week-nav { display: flex; gap: 6px; align-items: center; }
  .btn-nav {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-dim); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .btn-nav:hover { border-color: var(--accent-dim); color: var(--accent); }
  .week-label { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); }

  .btn-primary {
    padding: 10px 20px; border-radius: var(--radius); border: 1px solid var(--accent-dim);
    background: var(--accent-glow); color: var(--accent); font-size: 13px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary:hover { background: rgba(184,169,255,0.2); border-color: var(--accent); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .week-summary-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; margin-bottom: 24px;
    font-size: 14px; line-height: 1.8; color: var(--text-dim);
    white-space: pre-wrap;
  }
  .week-summary-box h3 { font-family: 'Playfair Display', serif; font-weight: 400; color: var(--text); margin-bottom: 14px; font-size: 1.15rem; }

  .qi-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-style: italic;
    color: var(--text);
    margin-top: 4px;
    line-height: 1.3;
  }
  .qi-title-loading {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace;
    margin-top: 4px;
  }
  .qi-title-loading .mini-bars { display: inline-flex; align-items: flex-end; gap: 1.5px; height: 10px; }
  .qi-title-loading .mini-bars span {
    display: block; width: 2px; border-radius: 1px; background: var(--accent-dim);
    animation: barFade 1.1s ease-in-out infinite;
  }
  .qi-title-loading .mini-bars span:nth-child(1) { height: 4px;  animation-delay: 0s; }
  .qi-title-loading .mini-bars span:nth-child(2) { height: 7px;  animation-delay: 0.18s; }
  .qi-title-loading .mini-bars span:nth-child(3) { height: 4px;  animation-delay: 0.36s; }
  .entry-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--text);
    margin-top: 2px;
  }
  .entry-inferred-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent-dim);
    margin-top: 3px;
  } font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 12px; }

  /* Notification toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--surface2); border: 1px solid var(--border-glow);
    border-radius: var(--radius); padding: 12px 18px;
    font-size: 13px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(8px); opacity: 0;
    transition: all 0.3s; pointer-events: none;
  }
  .toast.show { transform: none; opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Copy button */
  .copy-btn { float: right; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div>
        <h1>Night <em>Notes</em></h1>
        <p class="tagline">Local · Private · Yours</p>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-pill"><span class="dot checking" id="dot-whisper"></span><span id="label-whisper">checking whisper…</span></div>
      <div class="status-pill"><span class="dot checking" id="dot-ollama"></span><span id="label-ollama">checking ollama…</span></div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="record">↑ Upload</button>
    <button class="tab" data-tab="history">Journal</button>
    <button class="tab" data-tab="week">Weekly</button>
  </nav>

  <!-- UPLOAD PANEL -->
  <div class="panel active" id="panel-record">
    <div class="dropzone" id="dropzone">
      <span class="drop-icon">🎙</span>
      <div class="drop-title">Drop your voice note here</div>
      <div class="drop-sub">or click to browse</div>
      <div class="drop-formats">
        <span class="fmt-tag">m4a</span>
        <span class="fmt-tag">mp3</span>
        <span class="fmt-tag">wav</span>
        <span class="fmt-tag">ogg</span>
        <span class="fmt-tag">flac</span>
        <span class="fmt-tag">webm</span>
      </div>
      <input type="file" id="file-input" accept="audio/*" multiple/>
    </div>
    <div class="queue" id="queue"></div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="panel" id="panel-history">
    <div class="section-label">All entries</div>
    <div class="entries-list" id="entries-list">
      <div class="empty-state">
        <div class="empty-icon">📓</div>
        <p>No entries yet.<br>Upload your first voice note to get started.</p>
      </div>
    </div>
  </div>

  <!-- WEEK PANEL -->
  <div class="panel" id="panel-week">
    <div class="week-header">
      <div class="week-nav">
        <button class="btn-nav" id="week-prev">‹</button>
        <span class="week-label" id="week-label">This week</span>
        <button class="btn-nav" id="week-next">›</button>
      </div>
      <button class="btn-primary" id="btn-summarize">
        <span>✦</span> Summarise week
      </button>
    </div>
    <div id="week-summary-container"></div>
    <div class="section-label">Entries this week</div>
    <div class="entries-list" id="week-entries-list">
      <div class="empty-state">
        <div class="empty-icon">📅</div>
        <p>No entries for this week.</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const SERVER = "http://localhost:8765";
let entries = JSON.parse(localStorage.getItem("nj_entries") || "[]");
let weekOffset = 0; // 0 = current week, -1 = last week, etc.

function saveEntries() { localStorage.setItem("nj_entries", JSON.stringify(entries)); }

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, duration = 3000) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), duration);
}

// ─── Tab nav ──────────────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
    if (btn.dataset.tab === "history") renderHistory();
    if (btn.dataset.tab === "week") renderWeek();
  });
});

// ─── Health check ─────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(`${SERVER}/health`);
    const d = await r.json();
    setDot("whisper", d.whisper, d.whisper_engine || "whisper");
    setDot("ollama", d.ollama, d.ollama ? `ollama / ${d.model}` : "ollama offline");
  } catch {
    setDot("whisper", false, "server offline");
    setDot("ollama", false, "server offline");
  }
}

function setDot(id, ok, label) {
  const dot = document.getElementById("dot-" + id);
  const lbl = document.getElementById("label-" + id);
  dot.className = "dot " + (ok ? "ok" : "err");
  lbl.textContent = label;
}

checkHealth();
setInterval(checkHealth, 15000);

// ─── Drop zone ────────────────────────────────────────────────────────────────
const dz = document.getElementById("dropzone");
const fi = document.getElementById("file-input");

dz.addEventListener("click", () => fi.click());
dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("over"); });
dz.addEventListener("dragleave", () => dz.classList.remove("over"));
dz.addEventListener("drop", e => {
  e.preventDefault(); dz.classList.remove("over");
  handleFiles([...e.dataTransfer.files]);
});
fi.addEventListener("change", () => { handleFiles([...fi.files]); fi.value = ""; });

function handleFiles(files) {
  const audio = files.filter(f => f.type.startsWith("audio/") || /\.(m4a|mp3|wav|ogg|flac|aac|webm|opus)$/i.test(f.name));
  if (!audio.length) { toast("No audio files found."); return; }
  audio.forEach(uploadAndTranscribe);
}

async function uploadAndTranscribe(file) {
  const id = `qi-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
  const dateStr = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  const timeStr = new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });

  const el = document.createElement("div");
  el.className = "queue-item";
  el.id = id;
  el.innerHTML = `
    <div>
      <div class="qi-name">${escHtml(file.name)}</div>
      <div class="qi-date">${dateStr} · ${timeStr}</div>
      <div class="qi-title-slot"></div>
    </div>
    <div class="qi-status">
      <div class="bar-loader"><span></span><span></span><span></span></div>
    </div>
  `;
  document.getElementById("queue").prepend(el);

  const fd = new FormData();
  fd.append("audio", file, file.name);

  try {
    const resp = await fetch(`${SERVER}/transcribe`, { method: "POST", body: fd });
    const data = await resp.json();

    if (data.error) {
      el.querySelector(".qi-status").innerHTML = `<span style="color:var(--red)">✗ error</span>`;
      el.insertAdjacentHTML("beforeend", `<div class="transcript-box error">${escHtml(data.error)}</div>`);
      return;
    }

    const text = data.text || "(no speech detected)";
    el.querySelector(".qi-status").innerHTML = `<span style="color:var(--green)">✓ done</span>`;

    const entry = {
      id: id,
      filename: file.name,
      date: new Date().toISOString(),
      dateStr: dateStr,
      timeStr: timeStr,
      text: text,
      title: null,
      inferredDate: null,
      summary: null,
      engine: data.engine
    };
    entries.unshift(entry);
    saveEntries();

    // Show loading placeholder for title
    const titleSlot = el.querySelector(".qi-title-slot");
    if (titleSlot) {
      titleSlot.innerHTML = `<div class="qi-title-loading"><div class="mini-bars"><span></span><span></span><span></span></div> titling…</div>`;
    }

    el.insertAdjacentHTML("beforeend", `<div class="transcript-box">${escHtml(text)}</div>`);
    el.insertAdjacentHTML("beforeend", `
      <div class="qi-actions">
        <button class="btn-small" onclick="summariseEntry('${id}')">✦ Summarise</button>
        <button class="btn-small copy-btn" onclick="copyText('${id}')">⎘ Copy</button>
        <button class="btn-small danger" onclick="deleteQueueItem('${id}')">✕ Remove</button>
      </div>
    `);
    toast("Transcribed: " + file.name.slice(0, 30));

    // Fire titlize in background — non-blocking
    fetch(`${SERVER}/titlize`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, fallback_date: dateStr })
    }).then(r => r.json()).then(meta => {
      entry.title = meta.title || null;
      entry.inferredDate = meta.date || null;
      saveEntries();
      const slot = document.querySelector(`#${id} .qi-title-slot`);
      if (slot) {
        slot.innerHTML = meta.title
          ? `<div class="qi-title">${escHtml(meta.title)}</div>${meta.date ? `<div style="font-size:11px;color:var(--accent-dim);font-family:'DM Mono',monospace;margin-top:2px">📅 ${escHtml(meta.date)}</div>` : ""}`
          : "";
      }
    }).catch(() => {
      const slot = document.querySelector(`#${id} .qi-title-slot`);
      if (slot) slot.innerHTML = "";
    });
  } catch(e) {
    el.querySelector(".qi-status").innerHTML = `<span style="color:var(--red)">✗ failed</span>`;
    el.insertAdjacentHTML("beforeend", `<div class="transcript-box error">Could not reach server. Is server.py running?\n${e.message}</div>`);
  }
}

async function summariseEntry(id) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;

  // Find button and show loading
  const btn = document.querySelector(`[onclick="summariseEntry('${id}')"]`);
  if (btn) { btn.disabled = true; btn.textContent = "…"; }

  try {
    const resp = await fetch(`${SERVER}/summarize`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ entries: [entry.text], mode: "entry" })
    });
    const data = await resp.json();
    if (data.response) {
      entry.summary = data.response;
      saveEntries();
      // Show inline
      const qiEl = document.getElementById(id);
      if (qiEl) {
        let sumEl = qiEl.querySelector(".summary-inline");
        if (!sumEl) {
          sumEl = document.createElement("div");
          sumEl.className = "transcript-box summary-inline";
          sumEl.style.borderColor = "var(--accent-dim)";
          sumEl.style.borderLeftWidth = "3px";
          sumEl.style.gridColumn = "1 / -1";
          qiEl.insertAdjacentElement("beforeend", sumEl);
        }
        sumEl.textContent = data.response;
      }
      toast("Summary ready");
    }
  } catch(e) {
    toast("Summarise failed: " + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = "✦ Summarise"; }
  }
}

function copyText(id) {
  const entry = entries.find(e => e.id === id);
  if (entry) { navigator.clipboard.writeText(entry.text); toast("Copied to clipboard"); }
}

function deleteQueueItem(id) {
  entries = entries.filter(e => e.id !== id);
  saveEntries();
  document.getElementById(id)?.remove();
  toast("Entry deleted");
}

// ─── History ──────────────────────────────────────────────────────────────────
function renderHistory() {
  const container = document.getElementById("entries-list");
  if (!entries.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📓</div><p>No entries yet.<br>Upload your first voice note to get started.</p></div>`;
    return;
  }
  container.innerHTML = entries.map(e => entryCardHTML(e)).join("");
  container.querySelectorAll(".entry-header").forEach(h => {
    h.addEventListener("click", () => h.closest(".entry-card").classList.toggle("open"));
  });
}

function entryCardHTML(e) {
  const d = new Date(e.date);
  const dateLabel = d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  const timeLabel = d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
  return `
    <div class="entry-card">
      <div class="entry-header">
        <div>
          ${e.title ? `<div class="entry-title">${escHtml(e.title)}</div>` : ""}
          <div class="entry-date" style="${e.title ? 'font-size:0.85rem;margin-top:3px;color:var(--text-dim)' : ''}">${escHtml(dateLabel)}</div>
          <div class="entry-time">${timeLabel}${e.inferredDate ? ` · <span style="color:var(--accent-dim)">📅 ${escHtml(e.inferredDate)}</span>` : ""} · ${escHtml(e.filename)}</div>
        </div>
        <span class="entry-chevron">▾</span>
      </div>
      <div class="entry-body">
        <div class="entry-text">${escHtml(e.text)}</div>
        ${e.summary ? `<div class="entry-summary-block"><div class="entry-summary-label">✦ Summary</div><div class="entry-summary-text">${escHtml(e.summary)}</div></div>` : ""}
        <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn-small" onclick="navigator.clipboard.writeText(${JSON.stringify(e.text)});toast('Copied')">⎘ Copy transcript</button>
          ${!e.summary ? `<button class="btn-small" onclick="summariseAndRefresh('${e.id}')">✦ Summarise</button>` : ""}
        </div>
      </div>
    </div>`;
}

async function summariseAndRefresh(id) {
  await summariseEntry(id);
  const tab = document.querySelector(".tab.active");
  if (tab?.dataset.tab === "history") renderHistory();
  if (tab?.dataset.tab === "week") renderWeek();
}

// ─── Week view ────────────────────────────────────────────────────────────────
function getWeekRange(offset) {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((day + 6) % 7) + offset * 7);
  monday.setHours(0, 0, 0, 0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23, 59, 59, 999);
  return { monday, sunday };
}

function renderWeek() {
  const { monday, sunday } = getWeekRange(weekOffset);
  const fmt = d => d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  document.getElementById("week-label").textContent =
    weekOffset === 0 ? "This week" : `${fmt(monday)} – ${fmt(sunday)}`;

  const week = entries.filter(e => {
    const d = new Date(e.date);
    return d >= monday && d <= sunday;
  });

  const container = document.getElementById("week-entries-list");
  if (!week.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><p>No entries for this week.</p></div>`;
  } else {
    container.innerHTML = week.map(e => entryCardHTML(e)).join("");
    container.querySelectorAll(".entry-header").forEach(h => {
      h.addEventListener("click", () => h.closest(".entry-card").classList.toggle("open"));
    });
  }

  // Preserve existing summary
  document.getElementById("week-summary-container").innerHTML = "";
}

document.getElementById("week-prev").addEventListener("click", () => { weekOffset--; renderWeek(); });
document.getElementById("week-next").addEventListener("click", () => { if (weekOffset < 0) { weekOffset++; renderWeek(); } });

document.getElementById("btn-summarize").addEventListener("click", async () => {
  const btn = document.getElementById("btn-summarize");
  const { monday, sunday } = getWeekRange(weekOffset);
  const week = entries.filter(e => { const d = new Date(e.date); return d >= monday && d <= sunday; });

  if (!week.length) { toast("No entries this week to summarise."); return; }

  btn.disabled = true;
  btn.innerHTML = `<div class="spinner" style="border-top-color:var(--accent)"></div> Thinking…`;

  const container = document.getElementById("week-summary-container");
  container.innerHTML = `<div class="week-summary-box"><h3>Weekly Summary</h3><div style="color:var(--text-muted);font-size:13px">Ollama is thinking… this may take a moment.</div></div>`;

  try {
    const resp = await fetch(`${SERVER}/summarize`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ entries: week, mode: "week" })
    });
    const data = await resp.json();
    if (data.response) {
      container.innerHTML = `<div class="week-summary-box">
        <h3>Weekly Summary</h3>
        <div>${escHtml(data.response)}</div>
        <div style="margin-top:16px">
          <button class="btn-small" onclick="navigator.clipboard.writeText(${JSON.stringify(data.response)});toast('Copied')">⎘ Copy summary</button>
        </div>
      </div>`;
      toast("Week summarised ✦");
    } else {
      container.innerHTML = `<div class="week-summary-box" style="color:var(--red)">${escHtml(data.error || "Unknown error")}</div>`;
    }
  } catch(e) {
    container.innerHTML = `<div class="week-summary-box" style="color:var(--red)">Failed: ${escHtml(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<span>✦</span> Summarise week`;
  }
});

// ─── Util ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
